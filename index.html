<!DOCTYPE html>
<html lang="nl">
<head>

  <title>SB3 Heavy Player</title>

  <style>
    body {
      background: #0f0f0f;

      text-align: center;

      margin-top: 20px;
      border: 2px solid #444;
    }

      padding: 10px;
